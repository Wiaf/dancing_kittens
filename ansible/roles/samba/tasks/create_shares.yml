---
- name: create_shares | creating shared directories
  file:
    path: "{{ samba_mount_path + '/' + item['name'] }}"
    owner: "{{ item['owner']|default(omit) }}"
    group: "{{ item['group']|default(omit) }}"
    mode: "{{ item['folder_perms'] }}"
    state: directory
  become: true
  with_items: "{{ samba_shares }}"