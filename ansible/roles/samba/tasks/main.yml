 #   groups: "{{ item }}"
 # with_items: "{{ samba_users }}"

- name: set samba user passwords
  shell: "(echo {{ item['smbpasswd'] }}; echo {{ item['smbpasswd'] }}) | smbpasswd -s -a {{ item['name'] }}"
  with_items: "{{ samba_users }}"
  no_log: true

- name: install samba 
  apt: 
    name: "{{ samba_prerequirements }}"
    state: present

- name: mount mountpoints
  ansible.posix.mount:
    path: "{{ samba_mount_path }}"
    src: "UUID={{ samba_mount_UUID }}"
    fstype: ext4
    opts: noexec,nodev,noatime,nodiratime
    state: mounted
  notify: restart smbd
  ignore_errors: true
  when: samba_mount_path is defined

- name: Copy new smb.conf
  template:
    src: "{{ansible_hostname}}.conf.j2"
    dest: /etc/samba/smb.conf
  notify: restart smbd
  tags: config_samba

- name: copy fuck_datengrab.sh
  copy:
    src: fuck_datengrab.sh
    dest: /usr/local/bin/fuck_datengrab.sh
    owner: root
    group: root
    mode: '744'
  tags: recovery
  when: datengrab
